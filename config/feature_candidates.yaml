version: 1
candidate_pack: numeric_feature_pack_v1
candidates:
  - hypothesis_key: momentum_12_1
    name: Momentum 12-1
    source_feature: momentum_12_1
    materializer: momentum_12_1
    selection_direction: high
    thesis: >-
      Securities with stronger prior 12-month returns, skipping the most recent
      month, may continue to outperform over the next quarter.
    mechanism: >-
      Trend persistence and delayed investor reaction can make medium-term
      relative strength informative after costs.
    notes: Deterministic 12-1 simple-return momentum from adjusted closes.

  - hypothesis_key: avg_dollar_volume_63
    name: Average Dollar Volume 63
    source_feature: avg_dollar_volume_63
    materializer: avg_dollar_volume_63
    selection_direction: high
    thesis: >-
      Securities with higher recent dollar volume may have stronger
      institutional sponsorship and cleaner tradability over the next quarter.
    mechanism: >-
      Liquidity can proxy for investor attention, lower trading friction, and
      broader participation.
    notes: Trailing 63-session average of adjusted close times volume.

  - hypothesis_key: momentum_6_1
    name: Momentum 6-1
    source_feature: momentum_6_1
    materializer: momentum_6_1
    selection_direction: high
    thesis: >-
      Securities with stronger prior 6-month returns, skipping the most recent
      month, may continue to outperform over the next quarter.
    mechanism: >-
      A shorter trend window can capture fresher relative-strength effects while
      still avoiding the latest month of possible reversal noise.
    notes: Deterministic 6-1 simple-return momentum from adjusted closes.

  - hypothesis_key: momentum_3_0
    name: Momentum 3-0
    source_feature: return_63_0
    materializer: return_63_0
    selection_direction: high
    thesis: >-
      Securities with stronger trailing 3-month returns may continue to
      outperform over the next quarter.
    mechanism: >-
      Recent relative strength may reflect improving fundamentals, investor
      attention, or persistent flows not yet fully incorporated into prices.
    notes: Trailing 63-session simple return from adjusted closes.

  - hypothesis_key: short_reversal_21_0
    name: Short Reversal 21-0
    source_feature: return_21_0
    materializer: return_21_0
    selection_direction: low
    thesis: >-
      Securities with weaker trailing 1-month returns may rebound over the next
      quarter.
    mechanism: >-
      Short-horizon underperformance can reflect temporary pressure, liquidity
      shocks, or overreaction that partially reverses after formation.
    notes: Trailing 21-session simple return from adjusted closes.

  - hypothesis_key: low_realized_volatility_63
    name: Low Realized Volatility 63
    source_feature: realized_volatility_63
    materializer: realized_volatility_63
    selection_direction: low
    thesis: >-
      Securities with lower recent realized volatility may deliver better
      risk-adjusted forward returns than high-volatility peers.
    mechanism: >-
      The low-volatility effect can appear when investors overpay for high-beta
      or lottery-like stocks.
    notes: Trailing 63-session annualized sample standard deviation of returns.

  - hypothesis_key: revenue_growth_yoy
    name: Revenue Growth YoY
    source_feature: revenue_growth_yoy
    materializer: revenue_growth_yoy
    selection_direction: high
    thesis: >-
      Securities with stronger latest visible quarterly revenue growth versus
      the same fiscal quarter one year earlier may outperform over the next
      quarter.
    mechanism: >-
      Sustained top-line acceleration can indicate stronger demand, pricing
      power, or share gains before price fully reflects the business trend.
    notes: Latest visible quarterly revenue divided by same-quarter prior-year revenue minus one.

  - hypothesis_key: gross_margin
    name: Gross Margin
    source_feature: gross_margin
    materializer: gross_margin
    selection_direction: high
    thesis: >-
      Securities with higher latest visible quarterly gross margin may
      outperform over the next quarter.
    mechanism: >-
      Strong gross margins can indicate pricing power, cost discipline, or mix
      improvement that supports future earnings quality.
    notes: Latest visible quarterly gross profit divided by revenue.

  - hypothesis_key: operating_margin
    name: Operating Margin
    source_feature: operating_margin
    materializer: operating_margin
    selection_direction: high
    thesis: >-
      Securities with higher latest visible quarterly operating margin may
      outperform over the next quarter.
    mechanism: >-
      Operating margin can capture operating leverage and expense discipline
      that may persist beyond the report date.
    notes: Latest visible quarterly operating income divided by revenue.

  - hypothesis_key: net_margin
    name: Net Margin
    source_feature: net_margin
    materializer: net_margin
    selection_direction: high
    thesis: >-
      Securities with higher latest visible quarterly net margin may outperform
      over the next quarter.
    mechanism: >-
      Net margin captures bottom-line profitability after interest, tax, and
      other below-operating items that may matter to equity returns.
    notes: Latest visible quarterly net income divided by revenue.

  - hypothesis_key: diluted_shares_change_yoy
    name: Diluted Shares Change YoY
    source_feature: diluted_shares_change_yoy
    materializer: diluted_shares_change_yoy
    selection_direction: low
    thesis: >-
      Securities with lower diluted share-count growth versus the same fiscal
      quarter one year earlier may outperform over the next quarter.
    mechanism: >-
      Lower share growth, or outright shrinkage, can indicate lower dilution or
      active capital return that improves per-share economics.
    notes: Latest visible diluted weighted average shares divided by same-quarter prior-year shares minus one.
