name: Merge Readiness

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  merge-readiness:
    name: Python 3.10 checks
    runs-on: ubuntu-latest
    env:
      UV_PYTHON_DOWNLOADS: never
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv==0.9.18

      - name: Install locked dependencies
        run: uv sync --locked --group dev --python 3.10

      - name: Run merge-readiness checks
        run: |
          source .venv/bin/activate
          git diff --check
          python scripts/bootstrap_database.py --check
          python scripts/apply_migrations.py --check
          python scripts/seed_available_at_policies.py --check
          python scripts/seed_reference_data.py --check
          python scripts/seed_trading_calendar.py --check
          python -m pytest
          ruff check .
